name: API CI

on:
  push:
    paths:
      - "packages/api/**"
  pull_request:
    paths:
      - "packages/api/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: payclear
          POSTGRES_PASSWORD: payclear
          POSTGRES_DB: payclear
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://payclear:payclear@localhost:5432/payclear
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: packages/api
        run: pnpm install

      - name: Build
        working-directory: packages/api
        run: pnpm build

      - name: Test
        working-directory: packages/api
        run: pnpm test
