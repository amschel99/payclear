name: Web CI

on:
  push:
    paths:
      - "packages/web/**"
  pull_request:
    paths:
      - "packages/web/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        working-directory: packages/web
        run: pnpm install

      - name: Lint
        working-directory: packages/web
        run: pnpm lint

      - name: Build
        working-directory: packages/web
        run: pnpm build
