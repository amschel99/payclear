[package]
name = "payclear"
version = "0.1.0"
description = "PayClear — Native Compliance Layer for Institutional Stablecoin Payments on Solana"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "payclear"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]

[dependencies]
anchor-lang = { workspace = true }
anchor-spl = { workspace = true }
spl-transfer-hook-interface = { workspace = true }
spl-tlv-account-resolution = { workspace = true }
